[server]
# Use your computer's LAN address here so Apple Podcasts can reach it.
# Example: "http://192.168.1.25:8000"
base_url = "http://YOUR_LAN_IP:8000"
host = "0.0.0.0"
port = 8000
# Optional: require a simple shared password only for the main listing page.
# Podcast detail pages, RSS feeds, audio downloads, and cover images remain public.
# main_page_password = "change-me"

[feed]
title = "Local MP3 Podcasts"
description = "Private podcast feeds from local MP3 folders."
author = "Your Name"
language = "en-us"
explicit = "false"
category = "Music"
# image_url = "http://YOUR_LAN_IP:8000/static/cover.jpg"

# Each immediate directory inside this root becomes its own podcast feed.
# The first .jpg file in each podcast directory's top level becomes that podcast's cover image.
# For example:
#   /Users/you/Music/Local Podcasts/Show One
#   /Users/you/Music/Local Podcasts/Show Two
root_directory = "/Users/you/Music/Local Podcasts"
